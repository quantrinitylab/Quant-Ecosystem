version: '3.8'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: quant-postgres
    environment:
      POSTGRES_USER: quant
      POSTGRES_PASSWORD: quant
      POSTGRES_DB: quantdb
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U quant']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: quant-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: quant-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data

  mailhog:
    image: mailhog/mailhog
    container_name: quant-mailhog
    ports:
      - '1025:1025'
      - '8025:8025'

  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: quant-meilisearch
    environment:
      MEILI_MASTER_KEY: masterKey
    ports:
      - '7700:7700'
    volumes:
      - meilisearch_data:/meili_data

  nats:
    image: nats:latest
    container_name: quant-nats
    command: ['--jetstream', '--store_dir', '/data']
    ports:
      - '4222:4222'
      - '8222:8222'
    volumes:
      - nats_data:/data

  redpanda:
    image: redpandadata/redpanda:latest
    container_name: quant-redpanda
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://localhost:9092
      - --schema-registry-addr 0.0.0.0:8081
    ports:
      - '9092:9092'
      - '8081:8081'
      - '8082:8082'
    volumes:
      - redpanda_data:/var/lib/redpanda/data

volumes:
  postgres_data:
  redis_data:
  minio_data:
  meilisearch_data:
  nats_data:
  redpanda_data:
