# ============================================================================
# Shadow-deployment overlay (M11d) — compose override for the QuantAI
# memory-migration shadow run.
#
#   docker compose -f docker-compose.yml -f docker-compose.shadow.yml up -d \
#     postgres redis qdrant quantai
#
# What it adds on top of docker-compose.yml:
#   - qdrant (vector backend for the semantic layer / H3, when keys exist)
#   - QUANTAI_MEMORY_MODE (default: shadow) — the human-controlled ADR-011
#     mode flag; flip via env, never in code
#   - EXTRACTION_* passthrough for the OpenAI-compatible gateway
#
# Full procedure: docs/SHADOW_DEPLOY_RUNBOOK.md
# ============================================================================

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - '6333:6333'
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - quant-network
    healthcheck:
      test: ['CMD-SHELL', 'bash -c ":> /dev/tcp/127.0.0.1/6333" || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  quantai:
    environment:
      # ADR-011 facade mode: legacy | dual_write | shadow | new.
      # A HUMAN flips this after reviewing scoreboard rows — never automation.
      QUANTAI_MEMORY_MODE: ${QUANTAI_MEMORY_MODE:-shadow}
      # Vector backend (semantic layer; used once embedding access exists).
      QDRANT_URL: http://qdrant:6333
      # OpenAI-compatible extraction gateway (optional; live LLM extraction).
      EXTRACTION_API_KEY: ${EXTRACTION_API_KEY:-}
      EXTRACTION_BASE_URL: ${EXTRACTION_BASE_URL:-}
      EXTRACTION_MODEL: ${EXTRACTION_MODEL:-}
    depends_on:
      qdrant:
        condition: service_healthy

volumes:
  qdrant_data:
