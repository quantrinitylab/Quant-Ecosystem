groups:
  - name: quant-service-slos
    rules:
      # Per-service availability SLO alerts
      - alert: QuantMailAvailabilitySLO
        expr: |
          (
            sum(rate(http_requests_total{service="quantmail",status_code=~"5.."}[1h]))
            / sum(rate(http_requests_total{service="quantmail"}[1h]))
          ) > 0.001
        for: 5m
        labels:
          severity: critical
          service: quantmail
          slo_type: availability
        annotations:
          summary: "QuantMail availability SLO violation"
          description: "QuantMail error rate exceeds 0.1% threshold."
          runbook_url: "https://docs.quant.internal/runbooks/high-error-rate"

