  - name: quant-service-latency-slos
    rules:
      - alert: QuantMailLatencySLO
        expr: |
          histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{service="quantmail"}[5m])) by (le)) > 0.5
        for: 5m
        labels:
          severity: warning
          service: quantmail
          slo_type: latency
        annotations:
          summary: "QuantMail p95 latency SLO violation"
          description: "QuantMail p95 latency exceeds 500ms threshold."
          runbook_url: "https://docs.quant.internal/runbooks/high-latency"

      - alert: QuantChatLatencySLO
        expr: |
          histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{service="quantchat"}[5m])) by (le)) > 0.2
        for: 5m
        labels:
          severity: warning
          service: quantchat
          slo_type: latency
        annotations:
          summary: "QuantChat p95 latency SLO violation"
          description: "QuantChat p95 latency exceeds 200ms threshold."
          runbook_url: "https://docs.quant.internal/runbooks/high-latency"

      - alert: QuantMeetLatencySLO
        expr: |
          histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{service="quantmeet"}[5m])) by (le)) > 0.2
        for: 5m
        labels:
