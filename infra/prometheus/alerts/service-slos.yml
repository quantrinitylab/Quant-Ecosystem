        annotations:
          summary: "QuantMeet p95 latency SLO violation"
          description: "QuantMeet p95 latency exceeds 200ms threshold."
          runbook_url: "https://docs.quant.internal/runbooks/high-latency"

      - alert: QuantSyncLatencySLO
        expr: |
          histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{service="quantsync"}[5m])) by (le)) > 0.3
        for: 5m
        labels:
          severity: warning
          service: quantsync
          slo_type: latency
        annotations:
          summary: "QuantSync p95 latency SLO violation"
          description: "QuantSync p95 latency exceeds 300ms threshold."
          runbook_url: "https://docs.quant.internal/runbooks/high-latency"
