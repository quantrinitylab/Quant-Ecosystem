# QuantChat Fastify backend: deployment + service (no public ingress).
# The QuantChat frontend proxies server-side to this backend via the internal
# cluster DNS name set in QUANTCHAT_BACKEND_URL (shared configmap):
#   http://quant-platform-production-quantchat-backend:3002
# We deliberately do NOT expose an /api ingress: the frontend's Next route
# handlers remap some paths (e.g. /api/auth/userinfo -> backend /auth/me), so a
# raw /api rewrite would bypass and break them.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quant-platform-production-quantchat-backend
  namespace: quant-production
  labels:
    app.kubernetes.io/name: quantchat-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: quantchat-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: quantchat-backend
    spec:
      containers:
        - name: quantchat-backend
          image: 650708167640.dkr.ecr.us-east-1.amazonaws.com/quant-quantchat-backend:latest
          ports:
            - containerPort: 3002
              name: http
          envFrom:
            - configMapRef:
                name: quant-platform-production-config
            - secretRef:
                name: quant-platform-production-secrets
          env:
            - name: PORT
              value: '3002'
            - name: JWT_ISSUER
              value: 'quantchat'
          readinessProbe:
            tcpSocket:
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 3002
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: quant-platform-production-quantchat-backend
  namespace: quant-production
  labels:
    app.kubernetes.io/name: quantchat-backend
spec:
  selector:
    app.kubernetes.io/name: quantchat-backend
  ports:
    - port: 3002
      targetPort: 3002
      name: http
