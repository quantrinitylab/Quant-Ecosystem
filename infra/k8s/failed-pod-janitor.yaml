# Failed/Evicted pod janitor.
# Root cause of past deploy failures: when nodes hit DiskPressure the kubelet
# evicts pods, which are recreated and evicted again, piling up HUNDREDS of
# `Evicted` (status.phase=Failed) pods that never get garbage-collected. That
# clutter slowed the scheduler and made rollouts time out. This CronJob prunes
# Failed pods every 15 minutes so the namespace self-heals.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: failed-pod-janitor
  namespace: quant-production
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: failed-pod-janitor
  namespace: quant-production
rules:
  - apiGroups: ['']
    resources: ['pods']
    verbs: ['get', 'list', 'delete']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: failed-pod-janitor
  namespace: quant-production
subjects:
  - kind: ServiceAccount
    name: failed-pod-janitor
    namespace: quant-production
roleRef:
  kind: Role
  name: failed-pod-janitor
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: failed-pod-janitor
  namespace: quant-production
spec:
  schedule: '*/15 * * * *'
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 300
      backoffLimit: 1
      template:
        spec:
          serviceAccountName: failed-pod-janitor
          restartPolicy: Never
          containers:
            - name: janitor
              image: bitnami/kubectl:latest
              command:
                - /bin/sh
                - -c
                - >-
                  kubectl delete pods -n quant-production
                  --field-selector=status.phase=Failed --ignore-not-found=true;
                  kubectl delete pods -n quant-production
                  --field-selector=status.phase=Succeeded --ignore-not-found=true
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  memory: 64Mi
