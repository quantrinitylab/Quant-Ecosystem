# Routes quantmail.online subdomains to each app frontend service. Supplements
# the Helm-managed ingress (which only wired ws-gateway). Apply with:
#   kubectl apply -f infra/k8s/app-routing-ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: quant-apps-routing
  namespace: quant-production
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: '50m'
spec:
  ingressClassName: nginx
  rules:
    - host: mail.quantmail.online
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: quant-platform-production-quantmail
                port:
                  number: 3010
    - host: chat.quantmail.online
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: quant-platform-production-quantchat
                port:
                  number: 3015
    - host: ai.quantmail.online
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: quant-platform-production-quantai
                port:
                  number: 3020
    - host: admin.quantmail.online
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: quant-platform-production-admin
                port:
                  number: 3100
    - host: ws.quantmail.online
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: quant-platform-production-ws-gateway
                port:
                  number: 8080
