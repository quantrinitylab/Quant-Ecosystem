  source:
    repoURL: https://github.com/quantmailteamsupport-dev/Quant-Ecosystem.git
    targetRevision: main
    path: infra/helm/quant-platform
    helm:
      valueFiles:
        - values.yaml
        - values-production.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: quant-production
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
