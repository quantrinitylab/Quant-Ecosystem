global:
  environment: staging
  domain: staging.quant.dev
  databaseCIDRs:
    - 10.1.20.0/24
    - 10.1.21.0/24
    - 10.1.22.0/24
  redisCIDRs:
    - 10.1.10.0/24
    - 10.1.11.0/24
    - 10.1.12.0/24

configmap:
  NODE_ENV: staging
  LOG_LEVEL: debug
  CORS_ORIGINS: 'https://staging.quant.dev'
  JWT_ISSUER: 'https://staging.quant.dev'
  JWT_AUDIENCE: 'quant-platform-staging'

ingress:
  tls:
    secretName: quant-platform-staging-tls

meilisearch:
  enabled: true
  storage:
    size: 5Gi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 512Mi

services:
  ws-gateway:
    replicaCount: 2
    image:
      repository: 650708167640.dkr.ecr.us-east-1.amazonaws.com/quant-ws-gateway
    env:
      - name: WS_PORT
        value: '8080'
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi
    autoscaling:
      minReplicas: 2
      maxReplicas: 5
    pdb:
      minAvailable: 1

  quantmail:
    replicaCount: 1
    image:
      repository: 650708167640.dkr.ecr.us-east-1.amazonaws.com/quant-quantmail
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi
    autoscaling:
      minReplicas: 1
      maxReplicas: 3
    pdb:
      minAvailable: 1

  quantchat:
    replicaCount: 1
    image:
      repository: 650708167640.dkr.ecr.us-east-1.amazonaws.com/quant-quantchat
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi
    autoscaling:
      minReplicas: 1
      maxReplicas: 3
    pdb:
      minAvailable: 1

  quantai:
    replicaCount: 1
    image:
      repository: 650708167640.dkr.ecr.us-east-1.amazonaws.com/quant-quantai
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    autoscaling:
      minReplicas: 1
      maxReplicas: 5
    pdb:
      minAvailable: 1

  admin:
    replicaCount: 1
    image:
      repository: 650708167640.dkr.ecr.us-east-1.amazonaws.com/quant-admin
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi
    autoscaling:
      minReplicas: 1
      maxReplicas: 3
    pdb:
      minAvailable: 1

  triton-inference-server:
    replicaCount: 1
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 4Gi
    autoscaling:
      minReplicas: 1
      maxReplicas: 3
    pdb:
      minAvailable: 1
