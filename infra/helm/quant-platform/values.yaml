global:
  imageRegistry: ''
  imagePullSecrets: []
  environment: development
  domain: quant.local
  databaseCIDRs: []
  redisCIDRs: []

nameOverride: ''
fullnameOverride: ''

serviceAccount:
  create: true
  name: ''
  annotations: {}

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
  tls:
    enabled: true
    secretName: quant-platform-tls

configmap:
  NODE_ENV: production
  LOG_LEVEL: info
  CORS_ORIGINS: 'https://quant.local'
  JWT_ISSUER: 'https://quant.local'
  JWT_AUDIENCE: 'quant-platform'

secrets:
  externalSecret:
    enabled: true
    secretStoreRef:
      name: aws-secrets-manager
      kind: ClusterSecretStore
    refreshInterval: 1h
  keys:
    - JWT_SECRET
    - DATABASE_URL
    - REDIS_URL
    - AI_API_KEY
    - SMTP_PASSWORD
    - S3_ACCESS_KEY
    - S3_SECRET_KEY
    - MEILI_MASTER_KEY

meilisearch:
  enabled: true
  image:
    repository: getmeili/meilisearch
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  port: 7700
  storage:
    size: 10Gi
    storageClass: ''
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  env:
    - name: MEILI_ENV
      value: production
    - name: MEILI_NO_ANALYTICS
      value: 'true'

postgresql:
  enabled: false
  auth:
    postgresPassword: ''
    database: quantdb

redis:
  enabled: false
  architecture: standalone
  auth:
    enabled: false

services:
  ws-gateway:
    enabled: true
    replicaCount: 3
    image:
      repository: quant/ws-gateway
      tag: latest
      pullPolicy: IfNotPresent
    port: 8080
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    autoscaling:
      enabled: true
      minReplicas: 3
      maxReplicas: 20
      targetCPUUtilization: 60
      targetMemoryUtilization: 70
    pdb:
      enabled: true
      minAvailable: 2
    networkPolicy:
      enabled: true
      allowedNamespaces:
        - quant-system
    env: []
    secrets: []
    probes:
      liveness:
        path: /health
        initialDelaySeconds: 15
        periodSeconds: 10
      readiness:
        path: /health
        initialDelaySeconds: 5
        periodSeconds: 5
    websocket: true

  triton-inference-server:
    enabled: true
    runAsUser: 1000
    fsGroup: 1000
    replicaCount: 2
    image:
      repository: nvcr.io/nvidia/tritonserver
      tag: 24.01-py3-min
      pullPolicy: IfNotPresent
    port: 8000
    # NOTE: Current configuration is CPU-only. The model configs use KIND_CPU instance groups.
    # For GPU-backed inference, uncomment the nvidia.com/gpu resource below and update
    # model configs to use KIND_GPU. Consider using tritonserver:24.01-py3-min image for
    # CPU-only deployments to reduce image pull time.
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
        # nvidia.com/gpu: 1
      limits:
        cpu: 4000m
        memory: 8Gi
        # nvidia.com/gpu: 1
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilization: 70
      targetMemoryUtilization: 80
    pdb:
      enabled: true
      minAvailable: 1
    networkPolicy:
      enabled: true
      allowedNamespaces:
        - quant-system
    env:
      - name: MODEL_REPOSITORY
        value: /models
    secrets: []
    probes:
      liveness:
        path: /v2/health/live
        initialDelaySeconds: 30
        periodSeconds: 10
      readiness:
        path: /v2/health/ready
        initialDelaySeconds: 15
        periodSeconds: 5

  quantmail:
    enabled: true
    replicaCount: 2
    image:
      repository: quant/quantmail
      tag: latest
      pullPolicy: IfNotPresent
    port: 3010
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilization: 70
      targetMemoryUtilization: 75
    pdb:
      enabled: true
      minAvailable: 1
    networkPolicy:
      enabled: true
      allowedNamespaces:
        - quant-system
    env: []
    secrets: []
    probes:
      liveness:
        path: /health
        initialDelaySeconds: 15
        periodSeconds: 10
      readiness:
        path: /health
        initialDelaySeconds: 5
        periodSeconds: 5

  quantchat:
    enabled: true
    replicaCount: 2
    image:
      repository: quant/quantchat
      tag: latest
      pullPolicy: IfNotPresent
    port: 3015
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilization: 70
      targetMemoryUtilization: 75
    pdb:
      enabled: true
      minAvailable: 1
    networkPolicy:
      enabled: true
      allowedNamespaces:
        - quant-system
    env: []
    secrets: []
    probes:
      liveness:
        path: /health
        initialDelaySeconds: 15
        periodSeconds: 10
      readiness:
        path: /health
        initialDelaySeconds: 5
        periodSeconds: 5

  quantai:
    enabled: true
    replicaCount: 2
    image:
      repository: quant/quantai
      tag: latest
      pullPolicy: IfNotPresent
    port: 3020
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 15
      targetCPUUtilization: 65
      targetMemoryUtilization: 70
    pdb:
      enabled: true
      minAvailable: 1
    networkPolicy:
      enabled: true
      allowedNamespaces:
        - quant-system
    env: []
    secrets: []
    probes:
      liveness:
        path: /health
        initialDelaySeconds: 20
        periodSeconds: 10
      readiness:
        path: /health
        initialDelaySeconds: 10
        periodSeconds: 5

  admin:
    enabled: true
    replicaCount: 2
    image:
      repository: quant/admin
      tag: latest
      pullPolicy: IfNotPresent
    port: 3100
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilization: 70
      targetMemoryUtilization: 75
    pdb:
      enabled: true
      minAvailable: 1
    networkPolicy:
      enabled: true
      allowedNamespaces:
        - quant-system
    env: []
    secrets: []
    probes:
      liveness:
        path: /health
        initialDelaySeconds: 15
        periodSeconds: 10
      readiness:
        path: /health
        initialDelaySeconds: 5
        periodSeconds: 5

istio:
  enabled: false

monitoring:
  enabled: false
