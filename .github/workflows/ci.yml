name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint:strict

      - run: pnpm turbo typecheck

      - run: pnpm turbo test

      # Cap parallelism + raise heap: ~7 Next.js prod builds in parallel OOM'd the runner
      # non-deterministically (a different app failed each run). See BUG-1.
      - run: pnpm turbo build --concurrency=3
        env:
          NODE_OPTIONS: '--max-old-space-size=6144'

      - name: Run npm audit
        run: pnpm audit --audit-level=high

  check-docker-paths:
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'pull_request'
    outputs:
      should_build: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docker:
              - 'services/**'
              - '**/Dockerfile'
              - '.dockerignore'
              - 'packages/**'

  docker-build:
    runs-on: ubuntu-latest
    needs: [ci, check-docker-paths]
    if: |
      always() &&
      needs.ci.result == 'success' &&
      (github.event_name == 'push' || needs.check-docker-paths.outputs.should_build == 'true')
    strategy:
      matrix:
        service:
          - ws-gateway
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ matrix.service }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ matrix.service }}-

      - name: Build Docker image (${{ matrix.service }})
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: false
          load: true
          tags: quant-platform/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: quant-platform/${{ matrix.service }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results-${{ matrix.service }}.sarif'
          severity: 'HIGH,CRITICAL'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results-${{ matrix.service }}.sarif'
          category: 'trivy-${{ matrix.service }}'

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

