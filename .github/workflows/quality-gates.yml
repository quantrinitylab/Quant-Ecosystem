name: Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run tests with coverage
        run: pnpm vitest run --coverage --coverage.reporter=json --coverage.reporter=text
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
      - name: Upload coverage to summary
        if: always()
        run: |
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const data = require('./coverage/coverage-summary.json');
              const total = data.total;
              console.log('| Metric | Coverage |');
              console.log('|--------|----------|');
              console.log('| Lines | ' + total.lines.pct + '% |');
              console.log('| Branches | ' + total.branches.pct + '% |');
              console.log('| Functions | ' + total.functions.pct + '% |');
              console.log('| Statements | ' + total.statements.pct + '% |');
            " >> $GITHUB_STEP_SUMMARY
          fi

  # Coverage gate: CI-executable inline version of packages/testing/src/coverage-gate.ts
  # For programmatic use (e.g., local dev, custom tooling), see the CoverageGate class in that module.
  coverage-gate:
    runs-on: ubuntu-latest
    needs: test-and-coverage
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/
      - name: Run coverage gate (80% threshold on critical packages)
        run: |
          node -e "
            const fs = require('fs');
            const coverageFile = './coverage/coverage-final.json';
            if (!fs.existsSync(coverageFile)) {
              console.log('No coverage file found, skipping gate');
              process.exit(0);
            }
            const coverage = JSON.parse(fs.readFileSync(coverageFile, 'utf8'));
            const criticalPackages = ['packages/auth', 'packages/payments', 'packages/security'];
            const threshold = 80;
            let allPass = true;

            for (const pkg of criticalPackages) {
              const pkgFiles = Object.entries(coverage).filter(([path]) => path.includes(pkg));
              if (pkgFiles.length === 0) {
                console.log('⚠️  No coverage data for ' + pkg);
                continue;
              }
              let totalStatements = 0;
              let coveredStatements = 0;
              for (const [, data] of pkgFiles) {
                const s = data.s || {};
                const keys = Object.keys(s);
                totalStatements += keys.length;
                coveredStatements += keys.filter(k => s[k] > 0).length;
              }
              const pct = totalStatements > 0 ? (coveredStatements / totalStatements * 100).toFixed(1) : 0;
              const pass = pct >= threshold;
              if (!pass) allPass = false;
              console.log((pass ? '✅' : '❌') + ' ' + pkg + ': ' + pct + '% (threshold: ' + threshold + '%)');
            }

            if (!allPass) {
              console.error('Coverage gate FAILED: one or more critical packages below ' + threshold + '% threshold');
              process.exit(1);
            }
            console.log('✅ Coverage gate PASSED: all critical packages meet ' + threshold + '% threshold');
          "

  mutation-testing:
    runs-on: ubuntu-latest
    needs: test-and-coverage
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Install Stryker
        # NOTE: Stryker packages should be added to root devDependencies for version pinning.
        # Using runtime install as a transitional step until packages are declared in package.json.
        run: pnpm add -D @stryker-mutator/core @stryker-mutator/vitest-runner @stryker-mutator/typescript-checker
      - name: Run Stryker mutation testing
        run: npx stryker run
        continue-on-error: true
      - name: Check mutation score threshold (60%)
        run: |
          if [ -f reports/mutation/mutation.json ]; then
            node -e "
              const report = require('./reports/mutation/mutation.json');
              const score = report.mutationScore || 0;
              const threshold = 60;
              console.log('Mutation Score: ' + score.toFixed(1) + '%');
              if (score < threshold) {
                console.error('Mutation gate FAILED: ' + score.toFixed(1) + '% < ' + threshold + '%');
                process.exit(1);
              }
              console.log('✅ Mutation gate PASSED');
            "
          else
            echo "No mutation report found, skipping threshold check"
          fi
      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: reports/mutation/
          if-no-files-found: ignore

  e2e-tests:
    runs-on: ubuntu-latest
    needs: test-and-coverage
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: npx playwright test
        # Intentional: skeleton phase - journey definitions are not yet wired to a live server.
        # Will be enforced once Playwright runner adapter is integrated.
        continue-on-error: true
        env:
          BASE_URL: ${{ secrets.STAGING_BASE_URL || 'http://localhost:3000' }}
      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore

  accessibility:
    runs-on: ubuntu-latest
    needs: test-and-coverage
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run accessibility tests
        # NOTE: Requires either a STAGING_BASE_URL secret or a server startup step.
        # Soft gate until application server startup is configured in CI.
        # Will hard-fail once webServer config is added to playwright.config.ts.
        continue-on-error: true
        run: npx playwright test --project=chromium e2e/tests/a11y/
        env:
          BASE_URL: ${{ secrets.STAGING_BASE_URL || 'http://localhost:3000' }}
      - name: Upload a11y report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore

  load-tests:
    runs-on: ubuntu-latest
    needs: test-and-coverage
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6
      - name: Run chat fanout load test
        run: k6 run k6/chat-fanout.js --out json=results/chat-fanout.json
        # Intentional: load tests require a live staging environment; advisory-only until staging is provisioned.
        continue-on-error: true
        env:
          K6_BASE_URL: ${{ secrets.STAGING_BASE_URL || 'http://localhost:3000' }}
      - name: Run feed ranking load test
        run: k6 run k6/feed-ranking.js --out json=results/feed-ranking.json
        # Intentional: load tests require a live staging environment; advisory-only until staging is provisioned.
        continue-on-error: true
        env:
          K6_BASE_URL: ${{ secrets.STAGING_BASE_URL || 'http://localhost:3000' }}
      - name: Run search load test
        run: k6 run k6/search.js --out json=results/search.json
        # Intentional: load tests require a live staging environment; advisory-only until staging is provisioned.
        continue-on-error: true
        env:
          K6_BASE_URL: ${{ secrets.STAGING_BASE_URL || 'http://localhost:3000' }}
      - name: Upload load test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results
          path: results/
          if-no-files-found: ignore
