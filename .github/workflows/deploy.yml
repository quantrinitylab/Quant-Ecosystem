name: Build & Deploy (production)

# Builds the deployable service images, pushes them to ECR, and rolls out the
# quant-production EKS deployments. Auth to AWS is via GitHub OIDC assuming the
# `quant-gha-deploy` IAM role (no static secrets). Runs on push to main when a
# relevant path changes, or manually via the Actions tab.

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'services/**'
      - 'packages/**'
      - 'infra/scripts/**'
      - 'infra/k8s/**'
      - 'scripts/m11d-wu5-release-gate.ts'
      - 'scripts/__tests__/m11d-wu5-release-gate.test.ts'
      - 'docker-compose.shadow.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      apps:
        description: 'Comma-separated apps to deploy (default: all)'
        required: false
        default: 'all'

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  ACCOUNT_ID: '650708167640'
  CLUSTER: quant-production-eks
  NAMESPACE: quant-production

jobs:
  # This job has no cloud credentials. A memory authority-policy failure stops
  # every matrix deployment before AWS authentication, image push, or rollout.
  memory-release-preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @quant/database exec prisma generate --schema=prisma/schema.prisma

      - name: Enforce Memory rollback and production authority boundary
        run: |
          pnpm m11d:wu5:release-gate
          pnpm test:wu5:policy
          pnpm --filter @quant/quantai exec vitest run backend/__tests__/memory-facade.service.test.ts

  build-deploy:
    needs: memory-release-preflight
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: quantmail
            ecr: quant-quantmail
            dockerfile: apps/quantmail/Dockerfile
            deployment: quant-platform-production-quantmail
          - app: quantmail-backend
            ecr: quant-quantmail-backend
            dockerfile: apps/quantmail/Dockerfile.backend
            deployment: quant-platform-production-quantmail-backend
          - app: quantchat
            ecr: quant-quantchat
            dockerfile: apps/quantchat/Dockerfile
            deployment: quant-platform-production-quantchat
          - app: quantchat-backend
            ecr: quant-quantchat-backend
            dockerfile: apps/quantchat/Dockerfile.backend
            deployment: quant-platform-production-quantchat-backend
            manifest: infra/k8s/quantchat-backend.yaml
          - app: quantai
            ecr: quant-quantai
            dockerfile: apps/quantai/Dockerfile
            deployment: quant-platform-production-quantai
          - app: quantai-backend
            ecr: quant-quantai-backend
            dockerfile: apps/quantai/Dockerfile.backend
            deployment: quant-platform-production-quantai-backend
            manifest: infra/k8s/quantai-backend.yaml
          - app: admin
            ecr: quant-admin
            dockerfile: apps/admin/Dockerfile
            deployment: quant-platform-production-admin
          - app: ws-gateway
            ecr: quant-ws-gateway
            dockerfile: services/ws-gateway/Dockerfile
            deployment: quant-platform-production-ws-gateway
    steps:
      - uses: actions/checkout@v4

      - name: Free up runner disk
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL || true
          df -h

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::650708167640:role/quant-gha-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "${{ matrix.ecr }}" \
            || aws ecr create-repository --repository-name "${{ matrix.ecr }}" \
                 --image-scanning-configuration scanOnPush=true

      - name: Build & push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE="$REGISTRY/${{ matrix.ecr }}"
          docker build -f "${{ matrix.dockerfile }}" \
            -t "$IMAGE:${{ github.sha }}" \
            -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: Deploy to EKS
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          aws eks update-kubeconfig --name "$CLUSTER" --region "$AWS_REGION"
          IMAGE="$REGISTRY/${{ matrix.ecr }}:${{ github.sha }}"
          # Reap terminated (Evicted/Failed) pods before rolling out. Under node
          # DiskPressure these tombstones accumulate by the hundreds, which
          # cascades eviction churn and makes the rollout below time out even
          # though the new ReplicaSet is healthy. Best-effort, never fatal.
          kubectl delete pods -n "$NAMESPACE" --field-selector=status.phase=Failed --ignore-not-found=true || true
          # Apply the k8s manifest first when provided (creates the deployment,
          # service and ingress on first rollout; idempotent thereafter).
          if [ -n "${{ matrix.manifest }}" ]; then
            kubectl apply -f "${{ matrix.manifest }}" -n "$NAMESPACE"
          fi
          # Cap ReplicaSet history so stale RSs (and their evictable pods) don't
          # pile up across many deploys and keep the nodes under disk pressure.
          kubectl patch "deployment/${{ matrix.deployment }}" -n "$NAMESPACE" \
            --type=merge -p '{"spec":{"revisionHistoryLimit":2}}' || true
          kubectl set image "deployment/${{ matrix.deployment }}" "*=$IMAGE" -n "$NAMESPACE"
          # Rollouts can briefly churn while nodes pull the (large) images and
          # reclaim disk via image GC, so allow generous time to converge.
          kubectl rollout status "deployment/${{ matrix.deployment }}" -n "$NAMESPACE" --timeout=600s
